name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018" || true

      - name: Expo Prebuild (generate android folder)
        run: |
          npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Fix Gradle wrapper permissions
        run: chmod +x android/gradlew

      - name: Set local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Generate Signing Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias ovelin \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Ovelin Mall, OU=Mobile, O=Ovelin Mall, L=Khartoum, S=Sudan, C=SD" \
            -storepass ovelin2024 \
            -keypass ovelin2024

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=../android/app/release.keystore \
            -Pandroid.injected.signing.store.password=ovelin2024 \
            -Pandroid.injected.signing.key.alias=ovelin \
            -Pandroid.injected.signing.key.password=ovelin2024 \
            --no-daemon \
            --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m"

      - name: Find APK
        run: find android -name "*.apk" -type f

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release*.apk output/OvelinMall-v${{ github.run_number }}.apk || \
          cp $(find android -name "*.apk" -type f | head -1) output/OvelinMall-v${{ github.run_number }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OvelinMall-APK-v${{ github.run_number }}
          path: output/OvelinMall-v${{ github.run_number }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Ovelin Mall APK v${{ github.run_number }}"
          body: |
            ## 📱 Ovelin Mall Android APK

            ### تثبيت التطبيق:
            1. حمّل الملف `OvelinMall-v${{ github.run_number }}.apk`
            2. فعّل "تثبيت من مصادر غير معروفة" في إعدادات جهازك
            3. افتح الملف وثبّته

            ### مميزات التطبيق:
            - ✅ تطبيق أصيل (Native Android)
            - ✅ يتصل مباشرة بسيرفر https://ovelinmall-ovelin-mall.hf.space
            - ✅ جميع الصفحات مستقلة (بدون WebView)
            - ✅ تصفح المنتجات والتصنيفات
            - ✅ نظام طلبات كامل
            - ✅ محفظة رقمية
            - ✅ دعم فني
            - ✅ نظام إحالة
            - ✅ إشعارات
          files: output/OvelinMall-v${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
