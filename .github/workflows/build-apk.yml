name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Accept SDK licenses & install tools
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      - name: Set local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias ovelin \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Ovelin Mall,OU=Mobile,O=Ovelin,L=Khartoum,S=Sudan,C=SD" \
            -storepass OvelinSecure2024! \
            -keypass OvelinSecure2024! 2>&1

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=OvelinSecure2024! \
            -Pandroid.injected.signing.key.alias=ovelin \
            -Pandroid.injected.signing.key.password=OvelinSecure2024! \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Collect APK
        run: |
          mkdir -p output
          APK=$(find android -name "app-release*.apk" -type f | head -1)
          [ -z "$APK" ] && APK=$(find android -name "*.apk" -type f | head -1)
          cp "$APK" output/OvelinMall-v${{ github.run_number }}.apk
          ls -lh output/

      - uses: actions/upload-artifact@v4
        with:
          name: OvelinMall-APK-v${{ github.run_number }}
          path: output/OvelinMall-v${{ github.run_number }}.apk
          retention-days: 90

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "📱 Ovelin Mall APK v${{ github.run_number }}"
          body: |
            ## 📱 Ovelin Mall — تطبيق Android

            ### 📥 طريقة التثبيت:
            1. حمّل `OvelinMall-v${{ github.run_number }}.apk` من الأسفل
            2. **الإعدادات → الأمان → السماح بمصادر غير معروفة** ✅
            3. افتح الملف وثبّته

            ### 🔄 التحديثات تلقائية:
            أي تعديل على الموقع يظهر فوراً بدون تحديث التطبيق.

            ### 🔗 يعرض: `https://ovelinmall-ovelin-mall.hf.space/`
          files: output/OvelinMall-v${{ github.run_number }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
