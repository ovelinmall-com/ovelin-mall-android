name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" || true

      - name: Expo Prebuild
        run: |
          npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Fix permissions
        run: chmod +x android/gradlew

      - name: Set local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Generate Signing Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias ovelin \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Ovelin Mall,OU=Mobile,O=Ovelin,L=Khartoum,S=Sudan,C=SD" \
            -storepass ovelin2024 \
            -keypass ovelin2024

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=ovelin2024 \
            -Pandroid.injected.signing.key.alias=ovelin \
            -Pandroid.injected.signing.key.password=ovelin2024 \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Collect APK
        run: |
          mkdir -p output
          APK=$(find android -name "app-release*.apk" -type f | head -1)
          if [ -z "$APK" ]; then APK=$(find android -name "*.apk" -type f | head -1); fi
          echo "Found APK: $APK"
          cp "$APK" output/OvelinMall-v${{ github.run_number }}.apk
          ls -lh output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OvelinMall-APK-v${{ github.run_number }}
          path: output/OvelinMall-v${{ github.run_number }}.apk
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "📱 Ovelin Mall APK v${{ github.run_number }}"
          body: |
            ## 📱 Ovelin Mall — تطبيق Android الأصيل

            ### طريقة التثبيت:
            1. **حمّل** ملف `OvelinMall-v${{ github.run_number }}.apk` أدناه
            2. على هاتفك: **الإعدادات ← الأمان ← مصادر غير معروفة** ✅
            3. افتح الملف المحمّل وثبّته

            ### ✅ مميزات التطبيق:
            - تطبيق Android أصيل بدون WebView
            - يتصل بـ `https://ovelinmall-ovelin-mall.hf.space`
            - جميع الملفات مستقلة ومحلية
            - الرئيسية — تصنيفات ومنتجات
            - نظام طلبات كامل مع تتبع الحالة
            - محفظة رقمية (إيداع، معاملات)
            - دعم فني (تذاكر)
            - إحالة وتحويلات
            - عروض فلاش مع عداد تنازلي
            - إشعارات
          files: output/OvelinMall-v${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
