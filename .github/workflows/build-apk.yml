name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install platform tools
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Gradle permissions
        run: chmod +x android/gradlew

      - name: Set local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Restore or create signing keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "STORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          else
            keytool -genkey -v \
              -keystore android/app/release.keystore \
              -alias ovelin \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -dname "CN=Ovelin Mall,OU=Mobile,O=Ovelin,L=Khartoum,S=Sudan,C=SD" \
              -storepass OvelinSecure2024! \
              -keypass OvelinSecure2024! 2>&1
            echo "STORE_PASS=OvelinSecure2024!" >> $GITHUB_ENV
            echo "KEY_PASS=OvelinSecure2024!" >> $GITHUB_ENV
            echo "KEY_ALIAS=ovelin" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ env.STORE_PASS }}" \
            -Pandroid.injected.signing.key.alias="${{ env.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ env.KEY_PASS }}" \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"
        env:
          STORE_PASS: ${{ env.STORE_PASS }}
          KEY_PASS: ${{ env.KEY_PASS }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}

      - name: Collect APK
        id: collect
        run: |
          mkdir -p output
          APK=$(find android -name "app-release*.apk" -type f | head -1)
          [ -z "$APK" ] && APK=$(find android -name "*.apk" -type f | head -1)
          echo "Found: $APK"
          cp "$APK" "output/OvelinMall-v${{ github.run_number }}.apk"
          ls -lh output/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OvelinMall-APK-v${{ github.run_number }}
          path: output/OvelinMall-v${{ github.run_number }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "📱 Ovelin Mall APK v${{ github.run_number }}"
          body: |
            ## 📱 Ovelin Mall — تطبيق Android الأصيل

            ### 📥 طريقة التثبيت:
            1. **حمّل** ملف `OvelinMall-v${{ github.run_number }}.apk` من الأسفل
            2. على هاتفك: **الإعدادات → الأمان → السماح بمصادر غير معروفة** ✅
            3. افتح الملف المحمّل واتبع التعليمات

            ### ✅ ما يحتويه التطبيق:
            | الميزة | الوصف |
            |--------|-------|
            | 🏠 الرئيسية | عروض فلاش، تصنيفات، منتجات |
            | 🛍️ المنتجات | تفاصيل كاملة وطلب مباشر |
            | 📦 الطلبات | سجل مع تتبع الحالة |
            | 💳 المحفظة | رصيد، إيداع (MyCashi / OCash / BinancePay) |
            | 💬 الدعم | تذاكر دعم فني |
            | 👤 الحساب | ملف شخصي وإحالة |
            | 🔔 الإشعارات | تنبيهات فورية |
            | ↔️ التحويلات | تحويل رصيد بين المستخدمين |
            | ⚡ الفلاش | عروض محدودة بعداد تنازلي |

            ### 🔗 يتصل بـ: `https://ovelinmall-ovelin-mall.hf.space`
          files: output/OvelinMall-v${{ github.run_number }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
